<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>巡检打卡</title>
<style>:root{--p:#1890ff;--s:#52c41a;--d:#ff4d4f;--bg:#f5f6fa}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:var(--bg)}.c{max-width:480px;margin:0 auto;padding:0 16px 80px}.h{display:flex;align-items:center;gap:12px;padding:16px 0}.b{background:none;border:none;font-size:16px;color:var(--p);cursor:pointer}.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.card h3{font-size:15px;margin-bottom:12px}select,textarea{width:100%;padding:10px;border:1px solid #e8e8e8;border-radius:8px;font-size:14px;margin-bottom:12px}.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}.btn.p{background:var(--p);color:#fff}.btn:disabled{background:#d9d9d9;cursor:not-allowed}.st{padding:12px;border-radius:8px;margin:8px 0;font-size:14px}.st.w{background:#fff3cd;color:#856404}.st.ok{background:#d4edda;color:#155724}.st.err{background:#f8d7da;color:#721c24}.rg{display:flex;gap:12px;margin-bottom:12px}.rb{flex:1}.rb input{display:none}.rl{display:block;padding:12px;text-align:center;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer}.rb input:checked+.rl.n{border-color:var(--s);background:#f6ffed}.rb input:checked+.rl.a{border-color:var(--d);background:#fff2f0}.ir{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}.ir .l{color:#666}.ir .v{font-weight:500}.g{color:var(--s)!important}.b{color:var(--d)!important}#dg{display:none}</style></head>
<body><div class="c"><header class="h"><button class="b" onclick="history.back()">← 返回</button><h2>巡检打卡</h2></header>
<section class="card"><h3>📍 选择巡检点位</h3><select id="ps"><option value="">-- 加载中... --</option></select><button class="btn p" onclick="selPoint()">确认选择</button></section>
<section class="card" id="gc" style="display:none"><h3>📡 位置校验</h3><div id="gs" class="st w">⏳ 正在获取您的位置...</div><div id="gd"></div></section>
<section class="card" id="fc" style="display:none"><h3>📝 巡检内容</h3><div class="rg">
<label class="rb"><input type="radio" name="r" value="正常" checked><span class="rl n">✅ 正常</span></label>
<label class="rb"><input type="radio" name="r" value="异常"><span class="rl a">⚠️ 异常</span></label></div>
<div id="dg"><label style="font-size:14px;font-weight:500;display:block;margin-bottom:6px">问题描述 *</label><textarea id="desc" rows="3" placeholder="请描述发现的问题..."></textarea></div>
<button class="btn p" id="sb" disabled onclick="submit()">✅ 提交巡检记录</button></section></div>
<script>let cp,clat,clng;fetch('/.netlify/functions/points').then(r=>r.json()).then(d=>{document.getElementById('ps').innerHTML='<option value="">-- 请选择点位 --</option>'+d.points.map(p=>`<option value="${p.id}">${p.name} (${p.area})</option>`).join('');});
function selPoint(){const id=document.getElementById('ps').value;if(!id){alert('请选择点位');return}fetch('/.netlify/functions/points').then(r=>r.json()).then(d=>{cp=d.points.find(p=>p.id===id);document.getElementById('gc').style.display='block';startGPS();});}
function startGPS(){const se=document.getElementById('gs'),de=document.getElementById('gd');if(!navigator.geolocation){se.className='st err';se.textContent='❌ 浏览器不支持GPS';return}navigator.geolocation.getCurrentPosition(pos=>{clat=pos.coords.latitude;clng=pos.coords.longitude;const R=6371000,dLat=(cp.lat-clat)*Math.PI/180,dLng=(cp.lng-clng)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(clat*Math.PI/180)*Math.cos(cp.lat*Math.PI/180)*Math.sin(dLng/2)**2;const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));const inRange=dist<=cp.radius;de.innerHTML=`<div class="ir"><span class="l">你的坐标</span><span class="v">${clat.toFixed(6)}, ${clng.toFixed(6)}</span></div><div class="ir"><span class="l">点位坐标</span><span class="v">${cp.lat}, ${cp.lng}</span></div><div class="ir"><span class="l">距离</span><span class="v ${inRange?'g':'b'}">${dist.toFixed(1)} 米</span></div><div class="ir"><span class="l">允许偏差</span><span class="v">±${cp.radius} 米</span></div>`;if(inRange){se.className='st ok';se.textContent='✅ 位置校验通过';document.getElementById('fc').style.display='block';document.getElementById('sb').disabled=false}else{se.className='st err';se.textContent=`❌ 超出范围 ${dist.toFixed(1)}m`;document.getElementById('fc').style.display='none'}},err=>{se.className='st err';se.textContent='❌ 定位失败: '+err.message},{enableHighAccuracy:true,timeout:15000});}
document.querySelectorAll('input[name="r"]').forEach(r=>r.addEventListener('change',e=>{document.getElementById('dg').style.display=e.target.value==='异常'?'block':'none'}));
async function submit(){const res=document.querySelector('input[name="r"]:checked').value;const desc=document.getElementById('desc').value;if(res==='异常'&&!desc.trim()){alert('请填写问题描述');return}const btn=document.getElementById('sb');btn.disabled=true;btn.textContent='⏳ 提交中...';try{const r=await fetch('/.netlify/functions/checkin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({point_id:cp.id,lat:clat,lng:clng,result:res,description:desc})});const d=await r.json();if(d.success){alert('🎉 打卡成功！数据已保存至飞书多维表格');location.href='/'}else{alert('❌ '+d.message);btn.disabled=false;btn.textContent='✅ 重新提交'}}catch(e){alert('提交失败: '+e.message);btn.disabled=false;btn.textContent='✅ 重新提交'}}</script></body></html>
